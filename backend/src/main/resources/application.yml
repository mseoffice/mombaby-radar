server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev      # 默认开发期：Mock ChatModel（不依赖外部 Key）。测试期用 SPRING_PROFILES_ACTIVE=prod + DEEPSEEK_API_KEY 切真实 API
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:-mombaby_radar}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:-radar}
    password: ${MYSQL_PASSWORD:-radar_pwd_2026}
  jpa:
    hibernate:
      ddl-auto: update      # 研发期；上线前改为 validate + 版本化迁移
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:-radar}
    password: ${RABBITMQ_PASS:-radar_mq_2026}
    listener:
      simple:
        acknowledge-mode: auto
  elasticsearch:
    uris:
      - https://localhost:9200
    username: ${ES_USER:-elastic}
    password: ${ES_PASSWORD:-changeme}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # Spring AI（D2 落地）：DeepSeek 兼容 OpenAI 协议
  ai:
    openai:
      # DeepSeek 兼容端点（生产主选 LLM）
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:-mock-key}     # 测试期填真实 Key；开发期 mock-key 由 Mock ChatModel 接管
      chat:
        enabled: true                            # dev profile 会覆盖为 false
        options:
          model: deepseek-chat                   # DeepSeek 主模型
          temperature: 0.7

minio:
  endpoint: ${MINIO_ENDPOINT:-http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:-radar_minio}
  secret-key: ${MINIO_SECRET_KEY:-radar_minio_2026}
  bucket: ${MINIO_BUCKET:-mombaby-radar}

jwt:
  secret: ${JWT_SECRET:-change-me-radar-32bytes-min-secret}
  expiration-ms: 7200000     # 2h，35.2 章

ai:
  provider: deepseek         # 生产主选 LLM：deepseek / openai / mock（mock 仅开发期，由 dev profile 启用）

logging:
  level:
    com.mombaby.radar: INFO
