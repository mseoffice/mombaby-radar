server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:-mombaby_radar}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:-radar}
    password: ${MYSQL_PASSWORD:-radar_pwd_2026}
  jpa:
    hibernate:
      ddl-auto: update      # 研发期；上线前改为 validate + 版本化迁移
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:-radar}
    password: ${RABBITMQ_PASS:-radar_mq_2026}
    listener:
      simple:
        acknowledge-mode: manual
  elasticsearch:
    uris:
      - https://localhost:9200
    username: ${ES_USER:-elastic}
    password: ${ES_PASSWORD:-changeme}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

minio:
  endpoint: ${MINIO_ENDPOINT:-http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:-radar_minio}
  secret-key: ${MINIO_SECRET_KEY:-radar_minio_2026}
  bucket: ${MINIO_BUCKET:-mombaby-radar}

jwt:
  secret: ${JWT_SECRET:-change-me-radar-32bytes-min-secret}
  expiration-ms: 7200000     # 2h，35.2 章

ai:
  openai:
    api-key: ${OPENAI_API_KEY:-}        # D2 多平台；当前占位
    base-url: https://api.openai.com/v1
  # 百度 / 阿里 等按 D2 方案接入

logging:
  level:
    com.mombaby.radar: INFO
